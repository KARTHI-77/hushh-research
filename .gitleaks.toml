title = "hushh-research gitleaks config"

[extend]
useDefault = true

[[rules]]
    id = "hushh-developer-secret"
    description = "Detected a possible Hushh Developer Secret or API Token prefix"
    regex = '''(?i)(hushh_secret_|hushh_token_|pkm_key_)[a-z0-9\-_\.=]{16,64}'''
    tags = ["key", "api", "hushh", "secret"]

[allowlist]
description = "Documented backend env placeholders in the public example template"
paths = [
  '''^consent-protocol/\.env\.example$''',
]
regexes = [
  '''replace_with_64_char_hex_secret_key''',
  '''replace_with_64_char_hex_vault_encryption_key''',
  '''your_local_hex_secret_here''',
  '''your_local_vault_hex_here''',
  # False positive: route-state variable names in Kai layout matched Plaid client-id heuristic.
  '''onPlaidOauthReturnRoute''',
  '''onAlpacaOauthReturnRoute''',
]
